version: "3.9"

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: specai-backend
    ports:
      - "5000:5000"
    env_file:
      - ../backend/.env
    restart: unless-stopped
    networks:
      - specai-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: specai-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=http://backend:5000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - specai-network

networks:
  specai-network:
    driver: bridge
